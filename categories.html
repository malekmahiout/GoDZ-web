<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Catégories — GoDZ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css"/>
  <style>
    .cat-detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
    .cat-detail-card {
      border-radius: var(--radius); overflow: hidden; background: white;
      border: 1px solid var(--border); box-shadow: var(--card-shadow);
      transition: transform 200ms, box-shadow 200ms; text-decoration: none; color: inherit; display: block;
    }
    .cat-detail-card:hover { transform: translateY(-4px); box-shadow: var(--card-hover); }
    .cat-detail-img { width: 100%; height: 200px; object-fit: cover; display: block; }
    .cat-detail-body { padding: 20px; }
    .cat-detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .cat-detail-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .cat-detail-icon svg { width: 22px; height: 22px; }
    .cat-detail-name { font-size: 1.2rem; font-weight: 800; color: var(--dark); }
    .cat-detail-count { font-size: 0.82rem; color: var(--muted); }
    .cat-detail-desc { font-size: 0.85rem; color: var(--muted); line-height: 1.6; margin-bottom: 16px; }
    .cat-detail-previews { display: flex; gap: 6px; margin-bottom: 16px; }
    .cat-detail-preview { flex: 1; height: 52px; border-radius: 8px; object-fit: cover; background: var(--border); }
    .cat-stat { background: var(--light); border-radius: 10px; padding: 10px 14px; font-size: 0.8rem; }
    .cat-stat .val { font-size: 1.1rem; font-weight: 800; color: var(--dark); }
    .cat-stat .lbl { color: var(--muted); margin-top: 2px; }
  </style>
</head>
<body>
<nav class="navbar">
  <a href="index.html" class="navbar-brand">
    <div class="navbar-logo" aria-hidden="true"><img src="assets/favicon.png" alt="GoDZ" style="width:100%;height:100%;object-fit:contain"/></div>
  </a>
  <ul class="navbar-links">
    <li><a href="index.html">Accueil</a></li>
    <li><a href="explorer.html">Explorer</a></li>
    <li><a href="categories.html" class="active">Catégories</a></li>
    <li><a href="carte.html">Carte</a></li>
    <li><a href="itineraire.html">Circuit</a></li>
  </ul>
  <div class="navbar-actions">
    <img src="assets/bandeau_droit.png" alt="" class="navbar-bandeau"/>
    </div>
</nav>

<div style="padding-top:var(--nav-h)">
  <!-- Hero bar -->
  <div style="background:linear-gradient(135deg,#003d1f,#006233);color:white;padding:48px 0">
    <div class="container" style="text-align:center">
      <p style="font-size:0.8rem;font-weight:700;color:#FFD700;text-transform:uppercase;letter-spacing:0.1em;margin-bottom:12px">Catalogue</p>
      <h1 style="font-size:2.5rem;font-weight:900;color:white;margin-bottom:12px">Explorez par catégorie</h1>
      <p style="opacity:0.8;font-size:1rem" id="cat-hero-desc">Lieux répartis en thèmes pour guider votre découverte de l'Algérie.</p>
    </div>
  </div>

  <!-- Category details grid -->
  <div class="section">
    <div class="container">
      <div class="cat-detail-grid" id="cat-grid"></div>
    </div>
  </div>

  <!-- Wilayas section -->
  <div class="section" style="background:white;padding-top:40px;padding-bottom:60px">
    <div class="container">
      <div class="section-header">
        <p class="eyebrow">Destinations</p>
        <h2>Explorer par wilaya</h2>
        <p>Tous les lieux classés par wilaya.</p>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px" id="wilaya-grid"></div>
    </div>
  </div>
</div>

<nav class="mobile-nav">
  <div class="mobile-nav-items">
    <a href="index.html" class="mobile-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Accueil</a>
    <a href="explorer.html" class="mobile-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Explorer</a>
    <a href="carte.html" class="mobile-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/></svg>Carte</a>
    <a href="favoris.html" class="mobile-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>Favoris</a>
    <a href="itineraire.html" class="mobile-nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>Circuit</a>
  </div>
</nav>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  const CAT_DESCS = {
    monuments: "Les monuments historiques et architecturaux d'Algérie — de la Grande Mosquée à la Casbah d'Alger.",
    culture: "Musées, théâtres, sites culturels et patrimoine immatériel du pays.",
    plages: "Les plus belles plages de la Méditerranée algérienne, de Annaba à Oran.",
    montagnes: "Sommets, parcs nationaux et paysages montagneux — du Djurdjura à l'Ahaggar.",
    restaurants: "La gastronomie algérienne à travers les meilleures tables du pays.",
    salons: "Salons de thé, cafés maures et lieux de convivialité pour une pause authentique.",
    artisanat: "Poterie, broderie, bijouterie berbère — l'artisanat traditionnel d'Algérie."
  };

  const catCounts = {};
  const catRatings = {};
  const catWilayas = {};
  PLACES.forEach(p => {
    catCounts[p.category] = (catCounts[p.category]||0)+1;
    if (!catRatings[p.category]) catRatings[p.category] = [];
    catRatings[p.category].push(p.googleRating);
    if (!catWilayas[p.category]) catWilayas[p.category] = new Set();
    catWilayas[p.category].add(p.wilaya);
  });

  document.getElementById('cat-hero-desc').textContent =
    `${PLACES.length} lieux répartis en ${CATEGORIES.length} thèmes pour guider votre découverte de l'Algérie.`;

  const catGrid = document.getElementById('cat-grid');
  catGrid.innerHTML = CATEGORIES.map(cat => {
    const avg = catRatings[cat] ? (catRatings[cat].reduce((s,v)=>s+v,0)/catRatings[cat].length).toFixed(1) : '—';
    const wilayas = catWilayas[cat] ? catWilayas[cat].size : 0;
    return `
      <a href="explorer.html?cat=${cat}" class="cat-detail-card" aria-label="${CAT_LABELS[cat]}">
        <img class="cat-detail-img" src="${CAT_IMAGES[cat]}" alt="${CAT_LABELS[cat]}" loading="lazy" onerror="this.src='https://picsum.photos/seed/${cat}/640/200'"/>
        <div class="cat-detail-body">
          <div class="cat-detail-header">
            <div class="cat-detail-icon" style="background:${CAT_COLORS[cat]}22;color:${CAT_COLORS[cat]}">${CAT_ICONS[cat]}</div>
            <div>
              <div class="cat-detail-name">${CAT_LABELS[cat]}</div>
              <div class="cat-detail-count">${catCounts[cat]||0} lieux · ${wilayas} wilayas</div>
            </div>
          </div>
          <p class="cat-detail-desc">${CAT_DESCS[cat]}</p>
          <div style="display:flex;gap:10px">
            <div class="cat-stat">
              <div class="val">${catCounts[cat]||0}</div>
              <div class="lbl">Lieux</div>
            </div>
            <div class="cat-stat">
              <div class="val">${avg} ★</div>
              <div class="lbl">Note moy.</div>
            </div>
            <div class="cat-stat">
              <div class="val">${wilayas}</div>
              <div class="lbl">Wilayas</div>
            </div>
          </div>
        </div>
      </a>`;
  }).join('');

  // Wilaya grid
  const wilayaCounts = {};
  PLACES.forEach(p => { wilayaCounts[p.wilaya] = (wilayaCounts[p.wilaya]||0)+1; });
  const sorted = Object.entries(wilayaCounts).sort((a,b)=>b[1]-a[1]);
  document.getElementById('wilaya-grid').innerHTML = sorted.map(([w, cnt]) => `
    <a href="explorer.html?wilaya=${encodeURIComponent(w)}" style="display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--light);border-radius:10px;border:1px solid var(--border);text-decoration:none;color:var(--dark);font-size:0.88rem;font-weight:600;transition:all 150ms;cursor:pointer" onmouseover="this.style.borderColor='var(--green)'" onmouseout="this.style.borderColor='var(--border)'">
      <span>${w}</span>
      <span style="background:var(--green);color:white;font-size:0.72rem;font-weight:700;padding:2px 8px;border-radius:6px">${cnt}</span>
    </a>`).join('');
</script>
</body>
</html>
